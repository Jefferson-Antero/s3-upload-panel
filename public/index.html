<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Upload S3</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg:         #0a0a0a;
      --surface:    #141414;
      --border:     #262626;
      --accent:     #3b82f6;
      --accent-h:   #2563eb;
      --success:    #22c55e;
      --error:      #ef4444;
      --text:       #e5e5e5;
      --muted:      #737373;
      --radius:     12px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── LOGIN ─────────────────────────────────────────── */
    #login-screen {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 48px 40px;
      width: 100%;
      max-width: 400px;
    }

    .login-card h1 { font-size: 22px; font-weight: 600; margin-bottom: 6px; }
    .login-card > p { color: var(--muted); font-size: 14px; margin-bottom: 32px; }

    label { display: block; font-size: 13px; font-weight: 500; color: var(--muted); margin-bottom: 8px; }

    input[type=password] {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 16px;
      color: var(--text);
      font-size: 15px;
      outline: none;
      transition: border-color .2s;
      margin-bottom: 20px;
    }
    input[type=password]:focus { border-color: var(--accent); }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 11px 20px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      transition: background .2s, opacity .2s;
    }
    .btn-primary  { background: var(--accent); color: #fff; width: 100%; }
    .btn-primary:hover  { background: var(--accent-h); }
    .btn-primary:disabled { opacity: .5; cursor: not-allowed; }
    .btn-ghost    { background: transparent; color: var(--muted); padding: 8px 14px; }
    .btn-ghost:hover { background: var(--border); color: var(--text); }
    .btn-remove   { background: transparent; border: none; color: var(--muted); cursor: pointer; padding: 4px 8px; border-radius: 6px; font-size: 16px; line-height: 1; }
    .btn-remove:hover { color: var(--error); background: rgba(239,68,68,.1); }

    .err { color: var(--error); font-size: 13px; margin-top: 12px; text-align: center; min-height: 18px; }

    /* ── UPLOAD SCREEN ─────────────────────────────────── */
    #upload-screen { display: none; flex-direction: column; min-height: 100vh; }

    header {
      padding: 14px 32px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo { display: flex; align-items: center; gap: 10px; font-size: 15px; font-weight: 600; }
    .logo-box {
      width: 32px; height: 32px;
      background: var(--accent);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
    }

    main {
      flex: 1;
      padding: 32px;
      max-width: 820px;
      width: 100%;
      margin: 0 auto;
    }

    /* ── OVERALL PROGRESS ──────────────────────────────── */
    #overall-box {
      display: none;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 24px;
      margin-bottom: 24px;
    }

    .overall-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
      font-size: 13px;
    }

    .speed { background: rgba(59,130,246,.12); color: var(--accent); padding: 2px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; }

    /* ── DROP ZONE ─────────────────────────────────────── */
    #drop-zone {
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      padding: 52px 32px;
      text-align: center;
      cursor: pointer;
      transition: border-color .2s, background .2s;
      margin-bottom: 24px;
      user-select: none;
    }
    #drop-zone:hover, #drop-zone.over { border-color: var(--accent); background: rgba(59,130,246,.04); }
    #drop-zone .icon { font-size: 44px; display: block; margin-bottom: 14px; }
    #drop-zone h3 { font-size: 16px; font-weight: 500; margin-bottom: 6px; }
    #drop-zone p  { font-size: 13px; color: var(--muted); }
    #drop-zone .link { color: var(--accent); text-decoration: underline; }

    /* ── FILE LIST ─────────────────────────────────────── */
    #file-list { display: flex; flex-direction: column; gap: 12px; margin-bottom: 24px; }

    .file-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 20px;
    }

    .file-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }

    .file-ico {
      width: 38px; height: 38px; flex-shrink: 0;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
    }

    .file-info { flex: 1; min-width: 0; }
    .file-name { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .file-size { font-size: 12px; color: var(--muted); margin-top: 2px; }

    .badge {
      font-size: 11px; font-weight: 600;
      padding: 4px 10px; border-radius: 20px; white-space: nowrap;
    }
    .badge-wait     { background: rgba(115,115,115,.15); color: var(--muted); }
    .badge-upload   { background: rgba(59,130,246,.15);  color: var(--accent); }
    .badge-done     { background: rgba(34,197,94,.15);   color: var(--success); }
    .badge-error    { background: rgba(239,68,68,.15);   color: var(--error); }

    /* ── PROGRESS BAR ──────────────────────────────────── */
    .bar { height: 5px; background: var(--border); border-radius: 3px; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 3px; transition: width .3s; background: var(--accent); }
    .bar-fill.done  { background: var(--success); }
    .bar-fill.error { background: var(--error); }

    .progress-info {
      display: flex; justify-content: space-between;
      font-size: 12px; color: var(--muted);
      margin-top: 7px;
    }

    /* ── ACTIONS ───────────────────────────────────────── */
    #actions { display: none; align-items: center; gap: 16px; }
    #btn-upload { font-size: 15px; padding: 12px 28px; }
    #queue-info { font-size: 13px; color: var(--muted); }

    .hidden { display: none !important; }
  </style>
</head>
<body>

<!-- ════════════ LOGIN ════════════ -->
<div id="login-screen">
  <div class="login-card">
    <h1>📤 Upload S3</h1>
    <p>Digite a senha para acessar o painel de envio.</p>
    <label for="pwd">Senha</label>
    <input type="password" id="pwd" placeholder="••••••••" />
    <button class="btn btn-primary" id="btn-login" onclick="login()">Entrar</button>
    <p class="err" id="login-err"></p>
  </div>
</div>

<!-- ════════════ UPLOAD ════════════ -->
<div id="upload-screen">
  <header>
    <div class="logo">
      <img src="https://dstec.com.br/wp-content/uploads/2020/07/dstec-logo-branca.png" alt="Dstec" style="height:36px;object-fit:contain;" />
    </div>
    <button class="btn btn-ghost" onclick="logout()">Sair</button>
  </header>

  <main>
    <!-- Progresso geral -->
    <div id="overall-box">
      <div class="overall-top">
        <span id="overall-label">Enviando...</span>
        <span class="speed" id="speed-badge"></span>
      </div>
      <div class="bar">
        <div class="bar-fill" id="overall-fill" style="width:0%"></div>
      </div>
      <div class="progress-info">
        <span id="overall-bytes">0 B / 0 B</span>
        <span id="overall-pct">0%</span>
      </div>
    </div>

    <!-- Zona de drop -->
    <div id="drop-zone" onclick="document.getElementById('file-input').click()">
      <span class="icon">📁</span>
      <h3>Arraste os arquivos aqui</h3>
      <p>ou <span class="link">clique para selecionar</span></p>
      <p style="margin-top:6px">Qualquer tamanho · Múltiplos arquivos suportados</p>
    </div>
    <input type="file" id="file-input" multiple hidden onchange="handleFiles(this.files)" />

    <!-- Lista de arquivos -->
    <div id="file-list"></div>

    <!-- Botão de envio -->
    <div id="actions">
      <button class="btn btn-primary" id="btn-upload" onclick="startAll()">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="17 8 12 3 7 8"/>
          <line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
        Enviar Todos
      </button>
      <span id="queue-info"></span>
    </div>
  </main>
</div>

<script>
// ── Configuração ──────────────────────────────────────────────────────────────
const CHUNK_SIZE  = 100 * 1024 * 1024; // 100 MB por parte
const CONCURRENCY = 4;                  // partes em paralelo por arquivo

// ── Estado ────────────────────────────────────────────────────────────────────
let token = sessionStorage.getItem('s3_token');
let files = [];       // { id, file, status, bytesUploaded, uploadId, key, error }
let uploading = false;
let speedTimer = null;
let lastBytes = 0;
let lastTs = 0;

// ── Inicialização ─────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  if (token) showUpload();
});

document.getElementById('pwd').addEventListener('keydown', e => {
  if (e.key === 'Enter') login();
});

// Avisa se fechar a aba durante upload
window.addEventListener('beforeunload', e => {
  if (uploading) {
    e.preventDefault();
    e.returnValue = '';
  }
});

// ── Auth ──────────────────────────────────────────────────────────────────────
async function login() {
  const pwd = document.getElementById('pwd').value.trim();
  if (!pwd) return;
  const btn = document.getElementById('btn-login');
  const err = document.getElementById('login-err');
  btn.disabled = true;
  btn.textContent = 'Entrando...';
  err.textContent = '';
  try {
    const data = await api('/auth', { password: pwd }, false);
    token = data.token;
    sessionStorage.setItem('s3_token', token);
    showUpload();
  } catch (e) {
    err.textContent = e.message;
    btn.disabled = false;
    btn.textContent = 'Entrar';
  }
}

async function logout() {
  if (uploading && !confirm('Upload em andamento. Deseja sair mesmo assim?')) return;
  try { await api('/auth/logout', {}); } catch (_) {}
  token = null;
  sessionStorage.removeItem('s3_token');
  location.reload();
}

function showUpload() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('upload-screen').style.display = 'flex';
}

// ── Drag & drop ───────────────────────────────────────────────────────────────
const dz = document.getElementById('drop-zone');
dz.addEventListener('dragover',  e => { e.preventDefault(); dz.classList.add('over'); });
dz.addEventListener('dragleave', () => dz.classList.remove('over'));
dz.addEventListener('drop', e => {
  e.preventDefault();
  dz.classList.remove('over');
  handleFiles(e.dataTransfer.files);
});

function handleFiles(list) {
  for (const file of list) {
    const dup = files.some(f => f.file.name === file.name && f.file.size === file.size);
    if (!dup) {
      files.push({ id: uid(), file, status: 'wait', bytesUploaded: 0, uploadId: null, key: null, error: null });
    }
  }
  render();
}

// ── Render ────────────────────────────────────────────────────────────────────
function render() {
  const list    = document.getElementById('file-list');
  const actions = document.getElementById('actions');
  const waiting = files.filter(f => f.status === 'wait');

  if (files.length === 0) { list.innerHTML = ''; actions.style.display = 'none'; return; }

  actions.style.display = 'flex';
  document.getElementById('btn-upload').disabled = uploading || waiting.length === 0;
  document.getElementById('queue-info').textContent =
    `${files.length} arquivo${files.length > 1 ? 's' : ''} · ${fmt(files.reduce((s, f) => s + f.file.size, 0))} total`;

  list.innerHTML = files.map(f => {
    const pct   = Math.round((f.bytesUploaded / f.file.size) * 100);
    const fill  = f.status === 'done' ? 'done' : f.status === 'error' ? 'error' : '';
    const badge = { wait: 'badge-wait', uploading: 'badge-upload', done: 'badge-done', error: 'badge-error' }[f.status];
    const label = { wait: 'Aguardando', uploading: 'Enviando', done: 'Concluído', error: 'Erro' }[f.status];

    const infoLeft = f.status === 'error'
      ? `<span style="color:var(--error)">${f.error || 'Erro no upload'}</span>`
      : f.status === 'done'
        ? `<span style="color:var(--success)">✓ Enviado com sucesso</span>`
        : `${fmt(f.bytesUploaded)} / ${fmt(f.file.size)}`;

    return `
    <div class="file-card" id="fc-${f.id}">
      <div class="file-row">
        <div class="file-ico">${icon(f.file.name)}</div>
        <div class="file-info">
          <div class="file-name" title="${esc(f.file.name)}">${esc(f.file.name)}</div>
          <div class="file-size">${fmt(f.file.size)}</div>
        </div>
        <span class="badge ${badge}">${label}</span>
        ${f.status === 'wait' ? `<button class="btn-remove" title="Remover" onclick="removeFile('${f.id}')">✕</button>` : ''}
      </div>
      <div class="bar"><div class="bar-fill ${fill}" id="bf-${f.id}" style="width:${pct}%"></div></div>
      <div class="progress-info">
        <span id="pi-l-${f.id}">${infoLeft}</span>
        <span id="pi-r-${f.id}">${f.status !== 'wait' ? pct + '%' : ''}</span>
      </div>
    </div>`;
  }).join('');
}

// Atualiza apenas a barra de um arquivo sem re-renderizar tudo
function patchProgress(id) {
  const f = files.find(x => x.id === id);
  if (!f) return;
  const pct = Math.min(100, Math.round((f.bytesUploaded / f.file.size) * 100));
  const bf  = document.getElementById(`bf-${id}`);
  if (bf) bf.style.width = pct + '%';
  const pl = document.getElementById(`pi-l-${id}`);
  if (pl) pl.textContent = `${fmt(f.bytesUploaded)} / ${fmt(f.file.size)}`;
  const pr = document.getElementById(`pi-r-${id}`);
  if (pr) pr.textContent = pct + '%';
  renderOverall();
}

function renderOverall() {
  const total    = files.reduce((s, f) => s + f.file.size, 0);
  const uploaded = files.reduce((s, f) => s + f.bytesUploaded, 0);
  const pct      = total > 0 ? Math.round((uploaded / total) * 100) : 0;
  document.getElementById('overall-fill').style.width = pct + '%';
  document.getElementById('overall-bytes').textContent = `${fmt(uploaded)} / ${fmt(total)}`;
  document.getElementById('overall-pct').textContent   = pct + '%';
}

function removeFile(id) {
  files = files.filter(f => f.id !== id);
  render();
}

// ── Upload ────────────────────────────────────────────────────────────────────
async function startAll() {
  const waiting = files.filter(f => f.status === 'wait');
  if (!waiting.length || uploading) return;

  uploading = true;
  document.getElementById('overall-box').style.display = 'block';
  document.getElementById('btn-upload').disabled = true;
  document.getElementById('overall-label').textContent = 'Enviando arquivos...';
  startSpeedTracker();
  render();

  for (const f of waiting) {
    await uploadFile(f);
    render();
  }

  clearInterval(speedTimer);
  uploading = false;

  const allDone  = files.every(f => f.status === 'done');
  const hasError = files.some(f => f.status === 'error');
  document.getElementById('overall-label').textContent =
    allDone ? '✓ Todos os arquivos enviados com sucesso!' :
    hasError ? 'Concluído com erros' : 'Concluído';
  document.getElementById('speed-badge').textContent = '';
  render();
}

async function uploadFile(f) {
  f.status = 'uploading';
  f.bytesUploaded = 0;
  render();

  const totalParts    = Math.ceil(f.file.size / CHUNK_SIZE);
  const partUploaded  = new Array(totalParts).fill(0);
  const parts         = new Array(totalParts).fill(null);

  try {
    // 1. Inicia o multipart upload
    const { uploadId, key } = await api('/upload/initiate', {
      filename:    f.file.name,
      contentType: f.file.type || 'application/octet-stream',
    });
    f.uploadId = uploadId;
    f.key      = key;

    // 2. Cria tarefas para cada parte
    const tasks = Array.from({ length: totalParts }, (_, i) => async () => {
      const partNumber = i + 1;
      const start = i * CHUNK_SIZE;
      const chunk = f.file.slice(start, Math.min(start + CHUNK_SIZE, f.file.size));

      const { url } = await api('/upload/presign', { key, uploadId, partNumber });

      const etag = await xhrPut(url, chunk, loaded => {
        partUploaded[i] = loaded;
        f.bytesUploaded = partUploaded.reduce((a, b) => a + b, 0);
        patchProgress(f.id);
      });

      parts[i] = { PartNumber: partNumber, ETag: etag };
    });

    // 3. Executa com concorrência controlada
    await parallel(tasks, CONCURRENCY);

    // 4. Finaliza o multipart upload
    await api('/upload/complete', { key, uploadId, parts });

    f.status        = 'done';
    f.bytesUploaded = f.file.size;

  } catch (err) {
    console.error('uploadFile:', err);
    f.status = 'error';
    f.error  = err.message;
    if (f.uploadId && f.key) {
      api('/upload/abort', { key: f.key, uploadId: f.uploadId }).catch(() => {});
    }
  }
}

// Upload de uma parte diretamente para a URL assinada do S3 via XHR (suporta progresso)
function xhrPut(url, chunk, onProgress) {
  return new Promise((resolve, reject) => {
    const xhr = new XMLHttpRequest();
    xhr.open('PUT', url);
    xhr.upload.addEventListener('progress', e => {
      if (e.lengthComputable) onProgress(e.loaded);
    });
    xhr.addEventListener('load', () => {
      if (xhr.status === 200) {
        resolve(xhr.getResponseHeader('ETag'));
      } else {
        reject(new Error(`S3 retornou HTTP ${xhr.status}`));
      }
    });
    xhr.addEventListener('error', () => reject(new Error('Erro de conexão com S3')));
    xhr.send(chunk);
  });
}

// Executa um array de funções async com limite de concorrência
async function parallel(tasks, limit) {
  let i = 0;
  async function worker() {
    while (i < tasks.length) { await tasks[i++](); }
  }
  await Promise.all(Array.from({ length: Math.min(limit, tasks.length) }, worker));
}

// ── Velocidade ────────────────────────────────────────────────────────────────
function startSpeedTracker() {
  lastBytes = 0;
  lastTs    = Date.now();
  speedTimer = setInterval(() => {
    const now   = Date.now();
    const cur   = files.reduce((s, f) => s + f.bytesUploaded, 0);
    const speed = (cur - lastBytes) / ((now - lastTs) / 1000);
    document.getElementById('speed-badge').textContent = fmt(speed) + '/s';
    lastBytes = cur;
    lastTs    = now;
  }, 1500);
}

// ── Helpers ───────────────────────────────────────────────────────────────────
async function api(endpoint, body, auth = true) {
  const headers = { 'Content-Type': 'application/json' };
  if (auth) headers['x-auth-token'] = token;
  const res  = await fetch(endpoint, { method: 'POST', headers, body: JSON.stringify(body) });
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
  return data;
}

function fmt(bytes) {
  if (bytes === 0) return '0 B';
  const u = ['B', 'KB', 'MB', 'GB', 'TB'];
  const i = Math.floor(Math.log(bytes) / Math.log(1024));
  return (bytes / Math.pow(1024, i)).toFixed(1) + ' ' + u[i];
}

function icon(name) {
  const e = name.split('.').pop().toLowerCase();
  const m = { pdf:'📄', doc:'📝', docx:'📝', xls:'📊', xlsx:'📊',
              zip:'🗜️', rar:'🗜️', '7z':'🗜️', tar:'🗜️', gz:'🗜️',
              mp4:'🎬', mov:'🎬', avi:'🎬', mkv:'🎬',
              mp3:'🎵', wav:'🎵', flac:'🎵',
              jpg:'🖼️', jpeg:'🖼️', png:'🖼️', gif:'🖼️',
              sql:'🗃️', db:'🗃️', csv:'📋', json:'📋' };
  return m[e] || '📦';
}

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function uid() { return Math.random().toString(36).slice(2, 10); }
</script>
</body>
</html>
